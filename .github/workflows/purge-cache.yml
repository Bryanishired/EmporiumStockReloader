name: EmporiumStockReloader

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  purge:
    name: Purge Wiki Cache
    runs-on: ubuntu-latest

    steps:
      - name: Purge visible pages
        env:
          BOT_USERNAME: ${{ secrets.WIKI_BOT_USERNAME }}
          BOT_PASSWORD: ${{ secrets.WIKI_BOT_PASSWORD }}
        run: |
          curl -X POST --user "$BOT_USERNAME:$BOT_PASSWORD" \
            -d "action=purge&titles=The_Fish_Emporium|Virtual_Tank_Fish&format=json" \
            "https://insaniquarium.fandom.com/api.php"

  keepalive-job:
    name: Keep Repository Active
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create keepalive commit
        run: |
          echo "Last run: $(date -u)" > keepalive.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add keepalive.txt
          git commit -m "keepalive: $(date -u)" || echo "No changes to commit"

      - name: Push commit
        run: |
          git push
